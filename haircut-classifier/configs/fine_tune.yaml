# Fine-tune config — overrides src.config.TrainConfig defaults.
# Smaller batch + fewer epochs for Apple-silicon MPS runs; bump these up
# when on CUDA.
backbone: ViT-B-32
pretrained: laion2b_s34b_b79k
image_size: 224
batch_size: 64
epochs: 6
lr: 1.0e-5
weight_decay: 0.1
warmup_steps: 100
contrastive_weight: 0.5
wise_ft_alpha: 0.5
class_balanced_sampling: true
hard_negative_boost: 2.0
seed: 0
